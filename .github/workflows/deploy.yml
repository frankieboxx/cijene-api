name: Deploy to Railway
# Deploys to Railway after successful CI build on main branch.
#
# Required GitHub repository configuration:
#   Secrets: RAILWAY_TOKEN — Railway API token
#   Variables:
#     RAILWAY_API_SERVICE_ID            — Railway API service ID
#     RAILWAY_CRAWLER_SERVICE_ID        — Railway crawler service ID (all chains)
#     RAILWAY_STANIC_IMAGES_SERVICE_ID  — Railway Stanić image crawler service ID
#     (Railway project: c9eeed53-f5d1-4c5e-9eae-68793b4691c9)

on:
  push:
    branches: ["main"]

jobs:
  build:
    permissions: {}
    uses: ./.github/workflows/ci.yml  # reuse existing CI

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ vars.RAILWAY_API_SERVICE_ID }}

      - name: Deploy Crawler service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ vars.RAILWAY_CRAWLER_SERVICE_ID }}

      - name: Deploy Stanić image crawler service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ vars.RAILWAY_STANIC_IMAGES_SERVICE_ID }}
